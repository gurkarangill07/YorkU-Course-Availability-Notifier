name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: coursenotif_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d coursenotif_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/coursenotif_test
      OTP_PEPPER: ci-test-pepper
      AUTH_COOKIE_SECURE: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          node -e "
          const { Client } = require('pg');
          const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
          (async () => {
            for (let i = 0; i < 30; i += 1) {
              const client = new Client({ connectionString: process.env.DATABASE_URL });
              try {
                await client.connect();
                await client.end();
                console.log('postgres ready');
                return;
              } catch (error) {
                try { await client.end(); } catch (_) {}
                await sleep(1000);
              }
            }
            console.error('postgres not ready in time');
            process.exit(1);
          })();
          "

      - name: Apply schema
        run: npm run db:schema:apply

      - name: Syntax smoke check
        run: npm run smoke

      - name: Run tests
        run: npm test
