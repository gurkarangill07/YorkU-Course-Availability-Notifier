name: Monitor Course Seats

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  check-seats:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps

      - name: Run Monitor Once
        run: npm run monitor:once
        env:
          # Secrets configured in GitHub Repo Settings -> Secrets and variables -> Actions
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          VSB_SOURCE_MODE: browser
          VSB_URL: ${{ secrets.VSB_URL }}
          VSB_AUTO_RELOGIN_ENABLED: "true"
          VSB_LOGIN_USERNAME: ${{ secrets.VSB_LOGIN_USERNAME }}
          VSB_LOGIN_PASSWORD: ${{ secrets.VSB_LOGIN_PASSWORD }}
